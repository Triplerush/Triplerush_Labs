name: Deploy Portfolio Core to VPS

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Obtener el nombre del repo en minusculas
      - name: Lowercase Repository Name
        run: echo "REPO_OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 2. Login en GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Construir y subir imagen del Landing (frontend)
      - name: Build and Push Landing Image
        uses: docker/build-push-action@v5
        with:
          context: ./landing/frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/portfolio_landing:latest

      # 4. Construir y subir imagen del Chatbot (backend)
      - name: Build and Push Chatbot Image
        uses: docker/build-push-action@v5
        with:
          context: ./landing/backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/portfolio_chatbot:latest

      # 5. Deploy al VPS via SSH
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            DEPLOY_DIR="/home/${{ secrets.VPS_USERNAME }}/portfolio-core"
            REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

            # Crear carpeta de deploy
            mkdir -p "$DEPLOY_DIR"

            # Clonar repo temporal para extraer configs
            TMPDIR=$(mktemp -d)
            git clone --depth 1 "$REPO_URL" "$TMPDIR"

            # Copiar archivos de orquestacion
            cp "$TMPDIR/docker-compose.yml" "$DEPLOY_DIR/"
            cp "$TMPDIR/nginx.conf" "$DEPLOY_DIR/"

            # Copiar datos del chatbot (RAG knowledge base)
            mkdir -p "$DEPLOY_DIR/landing/backend/data"
            cp "$TMPDIR"/landing/backend/data/*.json "$DEPLOY_DIR/landing/backend/data/" 2>/dev/null || true
            cp "$TMPDIR"/landing/backend/data/*.md "$DEPLOY_DIR/landing/backend/data/" 2>/dev/null || true

            # Eliminar clon temporal
            rm -rf "$TMPDIR"

            # Login a GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u "${{ github.actor }}" --password-stdin

            # Crear .env con secrets (no se sube a git)
            echo "LLM_API_KEY=${{ secrets.LLM_API_KEY }}" > "$DEPLOY_DIR/.env"

            # Crear red portfolio-net (compartida con subproyectos)
            docker network create portfolio-net 2>/dev/null || true

            # Navegar al directorio de deploy
            cd "$DEPLOY_DIR"

            # Configurar imagenes
            export LANDING_IMAGE="${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/portfolio_landing:latest"
            export CHATBOT_IMAGE="${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/portfolio_chatbot:latest"

            # Desplegar
            docker compose down --remove-orphans || true
            docker compose pull
            docker compose up -d

            # Limpieza del disco
            docker image prune -a -f
