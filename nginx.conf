events {
    worker_connections 1024;
}

http {
    # ─── Upstreams (servicios del portfolio core) ─────────
    upstream portfolio_landing {
        server portfolio_landing:4000;
    }

    upstream portfolio_chatbot {
        server portfolio_chatbot:8080;
    }

    server {
        listen 80;
        server_name _;    # acepta cualquier host (IP directa o dominio futuro)

        # DNS interno de Docker — necesario para resolver dinámico
        # de subproyectos que pueden no estar levantados.
        resolver 127.0.0.11 valid=30s ipv6=off;

        # ─── Landing page ────────────────────────────────
        location / {
            proxy_pass http://portfolio_landing;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Chatbot API (SSE streaming) ─────────────────
        location /v1/chat {
            proxy_pass http://portfolio_chatbot;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
        }

        # ─── Chatbot Health ──────────────────────────────
        location /health {
            proxy_pass http://portfolio_chatbot;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ─── Subproyectos (resolver dinámico) ────────────
        # Usan "set $var" para que Nginx no falle al inicio
        # si el contenedor no existe. Solo esa ruta da 502.

        # Auto Profiling
        location /profiling/ {
            set $profiling http://profiling_proxy:3000;
            proxy_pass $profiling$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Proyecto N (template) ───────────────────────
        # location /proyecto-n/ {
        #     set $proyecto_n http://proyecto_n_proxy:XXXX;
        #     proxy_pass $proyecto_n$request_uri;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        # }
    }
}
