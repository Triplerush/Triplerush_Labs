events {
    worker_connections 1024;
}

http {
    # ─── Upstreams ───────────────────────────────────────
    upstream portfolio_landing {
        server portfolio_landing:4000;
    }

    # upstream portfolio_chatbot {
    #     server portfolio_chatbot:8080;
    # }

    upstream profiling {
        server profiling_proxy:3000;
    }

    # upstream proyecto_n {
    #     server proyecto_n_proxy:XXXX;
    # }

    server {
        listen 80;
        server_name _;    # acepta cualquier host (IP directa o dominio futuro)

        # ─── Landing page ────────────────────────────────
        location / {
            proxy_pass http://portfolio_landing;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Chatbot API (SSE streaming) — Fase 2 ───────
        # location /v1/chat {
        #     proxy_pass http://portfolio_chatbot;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header Connection '';
        #     proxy_http_version 1.1;
        #     chunked_transfer_encoding off;
        #     proxy_buffering off;
        #     proxy_cache off;
        # }

        # ─── Auto Profiling ─────────────────────────────
        location /profiling/ {
            proxy_pass http://profiling/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Proyecto N (template) ──────────────────────
        # location /proyecto-n/ {
        #     proxy_pass http://proyecto_n/;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        # }
    }
}
