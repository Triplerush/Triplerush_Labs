services:
  # ─── Nginx Global ───────────────────────────────────
  # Puerto configurable via NGINX_PORT:
  #   - Producción (VPS): NGINX_PORT no definido → usa 80 (default)
  #   - Local: NGINX_PORT=3080 en .env → usa 3080
  nginx-global:
    image: nginx:1.29.8-alpine
    container_name: nginx_global
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    depends_on:
      - portfolio-landing
      - portfolio-chatbot
    networks:
      - portfolio-net

  # ─── Landing Page (Vue 3 SPA) ──────────────────────
  portfolio-landing:
    build: ./landing/frontend
    image: ${LANDING_IMAGE:-ghcr.io/triplerush/portfolio_landing:latest}
    container_name: portfolio_landing
    restart: unless-stopped
    networks:
      - portfolio-net

  # ─── Chatbot Backend (FastAPI + RAG) ────────────────
  portfolio-chatbot:
    build: ./landing/backend
    image: ${CHATBOT_IMAGE:-ghcr.io/triplerush/portfolio_chatbot:latest}
    container_name: portfolio_chatbot
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gemini-2.5-flash-lite}
    volumes:
      - ./landing/backend/data:/app/data
    restart: unless-stopped
    networks:
      - portfolio-net

# La red se crea automáticamente con nombre explícito.
# Los subproyectos (auto_profilling, etc.) la referencian como external: true.
networks:
  portfolio-net:
    name: portfolio-net
