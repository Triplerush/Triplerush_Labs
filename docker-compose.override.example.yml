# docker-compose.override.example.yml
# Copiar como docker-compose.override.yml para desarrollo local:
#   cp docker-compose.override.example.yml docker-compose.override.yml
#
# Docker Compose automáticamente mergea ambos archivos al hacer:
#   docker compose up
#
# En la VPS este archivo NO existe — solo vive en tu máquina local.

services:
  nginx-global:
    ports:
      - "3080:80"      # Cambiar si 3080 también está ocupado
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Sin certificados SSL en local
