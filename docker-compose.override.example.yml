# docker-compose.override.example.yml
# ═══════════════════════════════════════════════════════════
# DEPRECATED: Ya no es necesario para cambiar puertos.
# Usa la variable NGINX_PORT en .env en su lugar:
#   NGINX_PORT=3080    → local
#   (sin definir)      → producción (default: 80)
#
# Este archivo se mantiene como referencia para overrides
# locales que no sean puertos (por ejemplo, montar volúmenes
# de código fuente para hot-reload durante desarrollo).
#
# Si lo usas, copia como docker-compose.override.yml:
#   cp docker-compose.override.example.yml docker-compose.override.yml
